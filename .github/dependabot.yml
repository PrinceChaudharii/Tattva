# ──────────────────────────────────────────────────────────────────────────────
# Tattva — Dependabot Configuration
#
# Keeps dependencies up-to-date with automated PRs.
# ──────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ── npm / pnpm ────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"
      include: "scope"
    reviewers:
      - "tattva-org/core"
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Next.js should be updated carefully
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # React 19 — hold until ecosystem catches up
      - dependency-name: "react"
        versions: [">=19.0.0"]
      - dependency-name: "react-dom"
        versions: [">=19.0.0"]

  # ── GitHub Actions ────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"

  # ── Docker ────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: "/infra/docker"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "docker"
      include: "scope"
